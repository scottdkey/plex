name: CI

# Thin caller stub → orca's reusable Plugin CI (build · test · clippy).
# All real CI logic lives in argyle-labs/orca; this repo just calls it.
#
# NOTE: until orca's reusable workflows reach `main`, pin `@dev` temporarily,
# then flip `@dev` → `@main` once they're merged.

on:
  push:
    branches: [dev, stage, main]
  pull_request:
    branches: [dev, main]

jobs:
  ci:
    uses: argyle-labs/orca/.github/workflows/plugin-ci.yml@main
