name: Promote dev → stage

# Thin caller stub → orca's reusable dev → stage promotion gate.
# Fast-forwards `stage` to `dev` HEAD iff dev's CI is green.
#
# NOTE: until orca's reusable workflows reach `main`, pin `@dev` temporarily,
# then flip `@dev` → `@main` once they're merged.

on:
  workflow_dispatch: {}

jobs:
  promote:
    uses: argyle-labs/orca/.github/workflows/plugin-promote-stage.yml@main
    secrets: inherit
