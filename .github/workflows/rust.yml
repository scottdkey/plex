name: Rust

# Builds and tests the orca plugin crate. The plugin-toolkit git dep resolves
# from the pinned rc tag in Cargo.toml; the committed .cargo/config.toml patch
# only applies when an orca checkout exists at ../orca, which CI does not have,
# so CI exercises the pure git-dep resolution path.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "specs/**"
      - build.rs
      - Cargo.toml
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
