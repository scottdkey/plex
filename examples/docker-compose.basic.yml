services:
  plex:
    image: ghcr.io/scottdkey/plex:latest
    container_name: plex
    network_mode: host
    restart: unless-stopped
    shm_size: 4g
    environment:
      PLEX_UID: "1000"
      PLEX_GID: "1000"
      LIBVA_DRIVER_NAME: auto   # auto-detects Intel iHD/i965 or AMD radeonsi
      # PLEX_CLAIM: "claim-xxxx"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/plex/config:/config
      - /opt/plex/transcode:/transcode
      - /mnt/media:/mnt/media:ro
    devices:
      - /dev/dri/renderD128
      - /dev/dri/card0
