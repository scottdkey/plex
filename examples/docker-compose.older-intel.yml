# For older Intel iGPUs (Gen4–9: HD Graphics 2000–6000, Haswell/Broadwell/Skylake)
# Uses the open-source i965 driver instead of iHD
services:
  plex:
    image: ghcr.io/scottdkey/plex:latest
    container_name: plex
    network_mode: host
    restart: unless-stopped
    shm_size: 4g
    environment:
      TZ: America/New_York
      PLEX_UID: "1000"
      PLEX_GID: "1000"
      LIBVA_DRIVER_NAME: i965
    volumes:
      - /opt/plex/config:/config
      - /opt/plex/transcode:/transcode
      - /mnt/media:/mnt/media:ro
    devices:
      - /dev/dri/renderD128
      - /dev/dri/card0
